<style>
  :root{--bg:#14110b;--panel:#1d1810;--panel2:#191409;--line:#39301f;

    --safe-top:env(safe-area-inset-top,0px)}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.4 -apple-system,system-ui,"Segoe UI",sans-serif;
    overscroll-behavior-y:contain;overflow-x:hidden}
  .top{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#1c1609,#14110bF0);
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    padding:calc(10px + var(--safe-top)) 14px 10px}
  .ttl{display:flex;align-items:baseline;gap:8px;margin-bottom:9px}
  .ttl h1{font:600 17px/1 Georgia,serif;color:var(--gold-bright);margin:0}
  .ttl .meta{font-size:11px;color:var(--mut);margin-left:auto;text-align:right}
  .search{width:100%;height:42px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);font-size:16px;padding:0 38px 0 14px;outline:none}
  .search:focus{border-color:var(--gold)}
  .searchwrap{position:relative}
  .searchwrap .clr{position:absolute;right:6px;top:5px;width:32px;height:32px;border:0;
    background:none;color:var(--faint);font-size:20px;display:none}
  .row2{display:flex;gap:8px;align-items:center;margin-top:9px}
  select{height:38px;border-radius:9px;border:1px solid var(--line);background:var(--panel);
    color:var(--ink);font-size:14px;padding:0 10px;flex:none}
  .chips{display:flex;gap:6px;overflow-x:auto;padding:1px 0 3px;flex:1;min-width:0;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  /* Tier chips wear the same colours as the per-row tier badges; deselected ones
     fade out (lower opacity + desaturated) so the active filter set is obvious. */
  .chip{flex:none;height:32px;padding:0 14px;border-radius:16px;border:1px solid;
    font-size:13px;font-weight:700;display:inline-flex;align-items:center;white-space:nowrap;
    transition:background .12s,color .12s,border-color .12s,opacity .12s}
  .chip.s{background:#fff;color:#c00000;border-color:#ff0000}
  .chip.t0{background:#5a1212;color:#ff8d7a;border-color:#d23b2a}
  .chip.t1{background:#5a3408;color:#ffb463;border-color:#e0851f}
  .chip.t2{background:#54470a;color:#ffe07a;border-color:#d9b733}
  .chip.t3{background:#0c3f3f;color:#79e6e6;border-color:#3aa0a0}
  .chip.t4{background:#2b2c30;color:#b9bec7;border-color:#5b6068}
  .chip.hide{background:#201d18;color:#9a8f78;border-color:#41392a}
  /* deselected → greyed-out hollow chip (overrides the tier colours above) */
  .chip:not(.on){background:#15110a;color:#6b6452;border-color:#352b1c;opacity:.7}
  .stats{display:flex;gap:1px;background:var(--line);border-bottom:1px solid var(--line)}
  .stat{flex:1;min-width:0;background:var(--bg);padding:9px 6px;text-align:center}
  .stat b{display:block;font:600 16px/1 Georgia,serif;color:var(--gold-bright)}
  .stat span{font-size:9.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut)}
  .list{padding:0 0 90px}
  .ghead{position:sticky;top:0;display:flex;align-items:center;gap:9px;padding:11px 14px 8px;
    background:#16120a;border-bottom:1px solid var(--line);cursor:pointer}
  .ghead .gl{color:var(--gold);font-size:16px}
  .ghead h2{font:600 14px/1 Georgia,serif;color:var(--gold-bright);margin:0}
  .ghead .cnt{font-size:11px;color:var(--mut);margin-left:auto;font-variant-numeric:tabular-nums}
  .ghead .car{color:var(--faint);transition:transform .15s;font-size:12px}
  .ghead.col .car{transform:rotate(-90deg)}
  .it{display:flex;align-items:center;gap:11px;padding:10px 14px;min-height:54px;
    border-bottom:1px solid #20190f}
  .it .bdg{flex:none;min-width:34px;text-align:center;font-size:10.5px;font-weight:700;
    padding:3px 7px;border-radius:7px;border:1px solid}
  .it .mid{flex:1;min-width:0;overflow:hidden}
  .it .nm{font-size:14.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .it .sub{font-size:11.5px;color:var(--mut);margin-top:2px;font-variant-numeric:tabular-nums;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .it .sub .dl{font-weight:600}.dl.near{color:#7fcf8a}.dl.mid{color:#e6c069}.dl.far{color:#e58d6a}
  .it .liq{display:inline-block;width:7px;height:7px;border-radius:50%;margin:0 3px 0 6px;vertical-align:middle}
  .liq.hi{background:#7fcf8a}.liq.mid{background:#e6c069}.liq.lo{background:#9a6b6b}
  .it .val{flex:none;text-align:right;font-variant-numeric:tabular-nums}
  .it .val .ex{font:650 17px/1.1 -apple-system,system-ui,"Segoe UI",Roboto,sans-serif;
    color:var(--gold-bright);font-variant-numeric:tabular-nums;letter-spacing:-.2px}
  .it .val .exu{font-size:10px;color:var(--faint)}
  .it .val .div{display:block;font-size:10.5px;color:var(--gold);margin-top:2px}
  .bdg.s{background:#fff;color:#c00;border-color:#f00}
  .bdg.t0{background:#5a1212;color:#ff8d7a;border-color:#d23b2a}
  .bdg.t1{background:#5a3408;color:#ffb463;border-color:#e0851f}
  .bdg.t2{background:#54470a;color:#ffe07a;border-color:#d9b733}
  .bdg.t3{background:#0c3f3f;color:#79e6e6;border-color:#3aa0a0}
  .bdg.t4{background:#2b2c30;color:#b9bec7;border-color:#5b6068}
  .bdg.hide{background:#201d18;color:#9a8f78;border-color:#41392a;font-size:9px}
  .empty{padding:50px 20px;text-align:center;color:var(--faint)}
  .foot{padding:18px 16px 30px;color:var(--faint);font-size:11px;text-align:center;line-height:1.5}
</style></head>

const byKey = Object.fromEntries(D.groups.map(g => [g.key, g]));
const state = { q: "", sort: "val", tiers: new Set(D.tierOrder), collapsed: new Set() };

document.getElementById("meta").innerHTML = D.league + "<br>1 Div = " + D.div + " ex · " + D.stamp;
document.getElementById("foot").textContent =
  "Headline = live poe2scout spot · under the name = our HLR-WM filter value + Δ · " + D.stats.n + " items · offline snapshot, regenerate for live prices.";

// Stats strip.
document.getElementById("stats").innerHTML = [
  ["±" + D.stats.medHlr + "%", "median Δ vs live"],
  [pct(D.stats.within10), "within ±10%"],
  [pct(D.stats.tierMatch), "tier = spot"],
  [D.stats.n, "items"],
].map(s => '<div class="stat"><b>' + s[0] + '</b><span>' + s[1] + '</span></div>').join("");
function pct(x){ return Math.round(100 * x / D.stats.n) + "%"; }

// Tier filter chips — styled with the same badge colours as the list rows.
document.getElementById("chips").innerHTML = D.tierOrder.map(function(t){
  var m = D.tiers[t];
  return '<button class="chip ' + m.cls + ' on" data-t="' + t + '">' + m.label + '</button>';
}).join("");

function fmtEx(n){ return n>=1000 ? Math.round(n).toLocaleString("en-US") : n>=1 ? n.toFixed(2) : n.toFixed(3); }
function dcls(d){ d=Math.abs(d); return d<=15?"near":d<=60?"mid":"far"; }
function liqcls(q){ return q>=200?"hi":q>=20?"mid":"lo"; }

function itemHTML(it){
  const m = D.tiers[it.t];
  // Headline = the LIVE spot (quick price reference); div suffix when ≥ 1 Divine.
  const dsuf = it.live >= D.div ? '<span class="div">' + (it.live/D.div).toFixed(it.live/D.div>=100?0:1) + ' div</span>' : '';
  const arrow = it.d >= 0 ? "▲" : "▼";
  // Under the name = OUR filter value + its Δ vs live (both derived from our calc).
  return '<div class="it">'
    + '<span class="bdg ' + m.cls + '">' + m.label + '</span>'
    + '<div class="mid"><div class="nm">' + esc(it.n) + '</div>'
      + '<div class="sub">HLR-WM: ' + fmtEx(it.hlr) + ' ex · <span class="dl ' + dcls(it.d) + '">' + arrow + (it.d>=0?"+":"") + it.d + '%</span>'
      + '<span class="liq ' + liqcls(it.q) + '"></span>' + it.q.toLocaleString("en-US") + '</div></div>'
    + '<div class="val"><span class="ex">' + fmtEx(it.live) + '</span><span class="exu"> ex</span>' + dsuf + '</div>'
    + '</div>';
}
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function sortFn(a, b){
  if (state.sort === "name") return a.n.localeCompare(b.n);
  if (state.sort === "delta") return Math.abs(b.d) - Math.abs(a.d);
  if (state.sort === "liq") return b.q - a.q;
  return b.hlr - a.hlr;
}

function render(){
  const q = state.q.trim().toLowerCase();
  const list = document.getElementById("list");
  let html = "", shown = 0;
  for (const g of D.groups){
    let its = D.items.filter(it => it.c === g.key && state.tiers.has(it.t)
      && (!q || it.n.toLowerCase().includes(q)));
    if (!its.length) continue;
    its = its.slice().sort(sortFn);
    shown += its.length;
    const col = state.collapsed.has(g.key) && !q;
    html += '<div class="ghead' + (col?" col":"") + '" data-g="' + g.key + '">'
      + '<span class="gl">' + g.glyph + '</span><h2>' + g.label + '</h2>'
      + '<span class="cnt">' + its.length + '</span><span class="car">▾</span></div>';
    if (!col) html += its.map(itemHTML).join("");
  }
  list.innerHTML = html || '<div class="empty">No items match.</div>';
  document.getElementById("clr").style.display = state.q ? "block" : "none";
}

// Events.
const qel = document.getElementById("q");
qel.addEventListener("input", () => { state.q = qel.value; render(); });
document.getElementById("clr").addEventListener("click", () => { qel.value=""; state.q=""; qel.focus(); render(); });
document.getElementById("sort").addEventListener("change", e => { state.sort = e.target.value; render(); });
document.getElementById("chips").addEventListener("click", e => {
  const b = e.target.closest(".chip"); if (!b) return;
  const t = b.dataset.t;
  if (state.tiers.has(t)) { state.tiers.delete(t); b.classList.remove("on"); }
  else { state.tiers.add(t); b.classList.add("on"); }
  render();
});
document.getElementById("list").addEventListener("click", e => {
  const h = e.target.closest(".ghead"); if (!h) return;
  const g = h.dataset.g;
  if (state.collapsed.has(g)) state.collapsed.delete(g); else state.collapsed.add(g);
  render();
});

render();
</script>
